plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "org.jetbrains.kotlin.plugin.compose"
    id "org.jetbrains.kotlin.plugin.parcelize"
    id "org.jetbrains.kotlin.kapt"
}

def keyPath = System.getenv("KEY_PATH")
def keyStorePassword = System.getenv("KEY_STORE_PASSWORD")
def signingKeyAlias = System.getenv("KEY_ALIAS")
def signingKeyPassword = System.getenv("KEY_PASSWORD")
def isReleasePackagingTask = gradle.startParameter.taskNames.any {
    def taskName = it.toLowerCase()
    taskName.contains("release")
            && (taskName.contains("assemble")
            || taskName.contains("bundle")
            || taskName.contains("package"))
}

android {
    compileSdk 37

    defaultConfig {
        applicationId "com.missxxx.misspipe"
        minSdk 26
        //noinspection OldTargetApi,ExpiredTargetSdkVersion
        targetSdk 35
        versionCode 1127
        versionName "5.4.6"
        multiDexEnabled true

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        vectorDrawables.useSupportLibrary = true

        javaCompileOptions {
            annotationProcessorOptions {
                arguments = ["room.schemaLocation": "$projectDir/schemas".toString()]
            }
        }
    }

    splits {
        abi {
            reset()
            enable true
            include "armeabi-v7a", "arm64-v8a", "x86_64", "x86"
        }
    }

    signingConfigs {
        if (keyPath && keyStorePassword && signingKeyAlias && signingKeyPassword) {
            release {
                storeFile file(keyPath)
                storePassword keyStorePassword
                keyAlias signingKeyAlias
                keyPassword signingKeyPassword
            }
        }
    }

    buildTypes {
        debug {
            debuggable true

            // suffix the app id and the app name with git branch name
            def workingBranch = getGitWorkingBranch()
            def normalizedWorkingBranch = workingBranch.replaceFirst("^[^A-Za-z]+", "").replaceAll("[^0-9A-Za-z]+", "")
            if (true) {
                // default values when branch name could not be determined or is master or dev
                applicationIdSuffix ".debug"
                resValue "string", "app_name", "MISSPipe Debug"
            } else {
                applicationIdSuffix ".debug." + normalizedWorkingBranch
                resValue "string", "app_name", "MISSPipe " + workingBranch
            }
        }

        release {
            if (signingConfigs.findByName("release")) {
                signingConfig signingConfigs.release
            } else if (isReleasePackagingTask) {
                throw new GradleException("Release APK/AAB builds require KEY_PATH, "
                        + "KEY_STORE_PASSWORD, KEY_ALIAS and KEY_PASSWORD. "
                        + "Debug keystore fallback is disabled to keep update signatures stable.")
            }
            if (System.properties.containsKey('packageSuffix')) {
                applicationIdSuffix System.getProperty('packageSuffix')
                resValue "string", "app_name", "MISSPipe " + System.getProperty('packageSuffix')
            } else {
                resValue "string", "app_name", "MISSPipe"
            }
            minifyEnabled true
            shrinkResources false // disabled to fix F-Droid's reproducible build
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    lint {
        checkReleaseBuilds false
        abortOnError false
    }

    compileOptions {
        // Flag to enable support for the new language APIs
        coreLibraryDesugaringEnabled true

        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
        encoding 'utf-8'
    }

    buildFeatures {
        buildConfig true
        viewBinding true
        compose true
        resValues true
    }

    dependenciesInfo {
        // Disables dependency metadata when building APKs.
        includeInApk = false
        // Disables dependency metadata when building Android App Bundles.
        includeInBundle = false
    }

    packaging {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    namespace 'org.schabi.newpipe'
}

tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
    kotlinOptions {
        jvmTarget = '21'
    }
}

kapt {
    correctErrorTypes true
}

androidComponents.onVariants(androidComponents.selector().all()) { variant ->
    def abiCodes = project.ext.abiCodes
    def defaultVersionCode = android.defaultConfig.versionCode as int
    def defaultVersionName = android.defaultConfig.versionName

    variant.outputs.each { output ->
        def outputFileName = output.outputFileName.get()
        def abi = abiCodes.keySet().sort { -it.length() }.find { outputFileName.contains(it) }
        def versionCode = 100 * defaultVersionCode
        if (abi != null) {
            versionCode = (100 * defaultVersionCode) + abiCodes[abi]
        }
        output.versionCode.set(versionCode)
        output.outputFileName.set("MISSPipe_${defaultVersionName}-${abi ?: 'universal'}-${variant.name}.apk")
    }
}

ext {
    androidxLifecycleVersion = '2.11.0'
    androidxRoomVersion = '2.8.4'
    androidxWorkVersion = '2.11.2'

    media3Version = '1.10.1'
    googleAutoServiceVersion = '1.1.1'
    groupieVersion = '2.10.1'
    markwonVersion = '4.6.2'

    leakCanaryVersion = '2.14'
    stethoVersion = '1.6.0'
    abiCodes = ['armeabi-v7a': 1, 'x86': 2, 'x86_64': 3, 'arm64-v8a': 4]
}

afterEvaluate {
}

